<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hakuna Matata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #222 url("https://i.postimg.cc/50QfZ2Kw/fond.jpg") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); z-index: 1; }
        
        .container { 
            position: relative; 
            z-index: 2; 
            width: 92%; 
            max-width: 380px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px; 
        }

        h1 { 
            font-size: 2.8rem; 
            font-style: italic; 
            font-weight: 900; 
            text-shadow: 0 5px 25px rgba(0,0,0,0.6); 
            margin-bottom: 10px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            width: 100%;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .search-bar input { width: 100%; border: none; outline: none; background: transparent; font-size: 1rem; color: #000; }

        .shortcuts { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            width: 100%;
            align-items: start;
        }

        /* TAILLE RÉDUITE À 35PX */
        .logo-link {
            width: 35px; 
            height: 35px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-decoration: none;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4));
            transition: transform 0.2s;
            opacity: 0.95;
        }

        .logo-link:active { transform: scale(0.9); }
        .logo-link img { width: 100%; height: 100%; object-fit: contain; }

        .col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; 
        }

        /* MÉTÉO TOUJOURS BIEN EN BAS */
        .weather-widget {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 100px;
            width: 100%;
        }
        .weather-item {
            text-decoration: none;
            opacity: 0.8;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .weather-emoji { font-size: 28px; }

        @media (max-height: 700px) {
            h1 { font-size: 2.4rem; }
            .shortcuts { gap: 20px; }
            .weather-widget { margin-top: 70px; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1>Hakuna Matata</h1>

    <form class="search-bar" action="https://www.google.com/search" method="GET">
        <input type="text" name="q" placeholder="Rechercher..." autocomplete="off">
    </form>

    <div class="shortcuts">
        <div class="col">
            <a href="https://www.20minutes.fr" class="logo-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=20minutes.fr">
            </a>
            <a href="https://www.huffingtonpost.fr" class="logo-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=huffingtonpost.fr">
            </a>
        </div>

        <div class="col">
            <a href="https://www.facebook.com" class="logo-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=facebook.com">
            </a>
            <a href="https://9gag.com/trending" class="logo-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=9gag.com">
            </a>
        </div>

        <div class="col">
            <a href="https://www.ovhcloud.com/fr/mail/" class="logo-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=ovh.com">
            </a>
            <a href="https://pro.doctolib.fr/signin" class="logo-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=doctolib.fr">
            </a>
        </div>

        <a href="https://m.youtube.com" class="logo-link" style="margin: 0 auto;">
            <img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com">
        </a>

        <a href="https://https://sfar.org/espace-professionel-anesthesiste-reanimateur/mes-revues/anesthesie-reanimation-anrea/" class="logo-link" style="margin: 0 auto;">
            <img src="https://www.google.com/s2/favicons?sz=128&domain=sfar.org">
        </a>

        <a href="https://www.amazon.fr" class="logo-link" style="margin: 0 auto;">
            <img src="https://www.google.com/s2/favicons?sz=128&domain=amazon.fr">
        </a>
    </div>

    <div class="weather-widget">
        <a href="https://marine.meteoconsult.fr/meteo-marine/bulletin-detaille/port-29/previsions-meteo-nice-aujourdhui" class="weather-item">
            <div class="weather-emoji">🌤️</div>
        </a>
        <a href="https://www.meteoblue.com/fr/meteo/semaine/nice_france_2990440" class="weather-item">
            <div class="weather-emoji">☁️</div>
        </a>
    </div>
</div>

</body>
</html>
