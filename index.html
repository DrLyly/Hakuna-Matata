<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hakuna Matata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #222 url("https://i.postimg.cc/50QfZ2Kw/fond.jpg") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); z-index: 1; }
        
        .container { 
            position: relative; 
            z-index: 2; 
            width: 90%; 
            max-width: 400px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center; 
            gap: 30px;
        }

        h1 { 
            font-size: 2.8rem; 
            font-style: italic; 
            font-weight: 900; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            margin-bottom: 5px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            margin: 0 auto 10px auto;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .search-bar input { width: 100%; border: none; outline: none; background: transparent; font-size: 1rem; color: #000; text-align: center; }

        /* GRILLE D'ICÔNES FLOTTANTES */
        .shortcuts { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px 15px; 
            padding: 10px;
        }

        .icon-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .icon-item:active { transform: scale(0.9); }

        /* Cercle de fond très discret pour détacher le logo si besoin */
        .icon-circle {
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); /* Ombre pour la lisibilité */
        }

        .icon-circle img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        /* Label discret sous les icônes (optionnel, j'ai réduit l'opacité) */
        .icon-label {
            font-size: 0.6rem;
            font-weight: 800;
            margin-top: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.9;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* MÉTÉO STYLE WIDGET BAS */
        .weather-widget {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 20px;
            margin-bottom: 10px; /* Redescendu pour être proche du bord mais pas trop */
        }
        .weather-item {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.8;
            transition: 0.3s;
        }
        .weather-emoji { font-size: 26px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .weather-label { font-size: 0.55rem; font-weight: 900; letter-spacing: 1.5px; margin-top: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        @media (max-height: 650px) {
            h1 { font-size: 2.2rem; }
            .icon-circle { width: 45px; height: 45px; }
            .icon-circle img { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    
    <div class="main-content">
        <h1>Hakuna Matata</h1>

        <form class="search-bar" action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Rechercher..." autocomplete="off">
        </form>

        <div class="shortcuts">
            <a href="https://www.20minutes.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=20minutes.fr"></div>
                <span class="icon-label">20Min</span>
            </a>
            <a href="https://www.facebook.com" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=facebook.com"></div>
                <span class="icon-label">Facebook</span>
            </a>
            <a href="https://www.ovhcloud.com/fr/mail/" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=ovh.com"></div>
                <span class="icon-label">Mail</span>
            </a>

            <a href="https://www.huffingtonpost.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=huffingtonpost.fr"></div>
                <span class="icon-label">Huff</span>
            </a>
            <a href="https://9gag.com" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=9gag.com"></div>
                <span class="icon-label">9GAG</span>
            </a>
            <a href="https://www.doctolib.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=doctolib.fr"></div>
                <span class="icon-label">Doctolib</span>
            </a>

            <a href="https://m.youtube.com" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com"></div>
                <span class="icon-label">YouTube</span>
            </a>
            <a href="https://sfar.org" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=sfar.org"></div>
                <span class="icon-label">ANREA</span>
            </a>
            <a href="https://www.amazon.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=amazon.fr"></div>
                <span class="icon-label">Amazon</span>
            </a>
        </div>
    </div>

    <div class="weather-widget">
        <a href="https://marine.meteoconsult.fr" class="weather-item">
            <div class="weather-emoji">🌤️</div>
            <div class="weather-label">MARINE</div>
        </a>
        <a href="https://www.meteoblue.com" class="weather-item">
            <div class="weather-emoji">☁️</div>
            <div class="weather-label">BLUE</div>
        </a>
    </div>

</div>

</body>
</html>
