<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hakuna Matata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --icon-bg: rgba(255, 255, 255, 0.06);
        }

        body {
            background: #222 url("https://i.postimg.cc/50QfZ2Kw/fond.jpg") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.15); z-index: 1; }
        
        .container { 
            position: relative; 
            z-index: 2; 
            width: 90%; 
            max-width: 380px; /* Un peu plus étroit pour le centrage */
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center; /* Centre tout le bloc verticalement */
            gap: 20px;
        }

        h1 { 
            font-size: 2.8rem; 
            font-style: italic; 
            font-weight: 900; 
            text-shadow: 0 5px 20px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .search-bar input { width: 100%; border: none; outline: none; background: transparent; font-size: 0.95rem; color: #000; text-align: center; }

        .shortcuts { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }

        /* Cartes plus petites et carrées */
        .shortcut-card, .double-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            aspect-ratio: 1 / 1; /* Carré parfait */
            min-height: auto;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .shortcut-card:active { transform: scale(0.92); background: rgba(255,255,255,0.1); }

        .icon {
            width: 45px; 
            height: 45px;
            display: flex; align-items: center; justify-content: center;
        }
        .icon img { width: 32px; height: 32px; object-fit: contain; }

        /* Double boutons sans texte */
        .double-card { padding: 0; overflow: hidden; }
        .double-link {
            flex: 1; width: 100%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: white;
        }
        .double-link:first-child { border-bottom: 1px solid var(--glass-border); }
        .double-img { width: 22px; height: 22px; object-fit: contain; }

        /* MÉTÉO REMONTÉE */
        .weather-widget {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px; /* Espace pour ne pas toucher le bas du navigateur */
        }
        .weather-item {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.7;
            transition: 0.3s;
        }
        .weather-emoji { font-size: 22px; margin-bottom: 4px; }
        .weather-label { font-size: 0.55rem; font-weight: 900; letter-spacing: 1px; }

        @media (max-height: 700px) {
            .container { gap: 10px; }
            h1 { font-size: 2.2rem; }
            .icon img { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    
    <div class="main-content">
        <h1>Hakuna Matata</h1>

        <form class="search-bar" action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Rechercher..." autocomplete="off">
        </form>

        <div class="shortcuts">
            <div class="double-card">
                <a href="https://www.20minutes.fr" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=20minutes.fr" class="double-img">
                </a>
                <a href="https://www.huffingtonpost.fr" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=huffingtonpost.fr" class="double-img">
                </a>
            </div>

            <div class="double-card">
                <a href="https://www.facebook.com" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=facebook.com" class="double-img">
                </a>
                <a href="https://9gag.com" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=9gag.com" class="double-img">
                </a>
            </div>

            <div class="double-card">
                <a href="https://www.ovhcloud.com/fr/mail/" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=ovh.com" class="double-img">
                </a>
                <a href="https://www.doctolib.fr" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=doctolib.fr" class="double-img">
                </a>
            </div>

            <a href="https://m.youtube.com" class="shortcut-card">
                <div class="icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com"></div>
            </a>

            <a href="https://sfar.org" class="shortcut-card">
                <div class="icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=sfar.org"></div>
            </a>

            <a href="https://www.amazon.fr" class="shortcut-card">
                <div class="icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=amazon.fr"></div>
            </a>
        </div>
    </div>

    <div class="weather-widget">
        <a href="https://marine.meteoconsult.fr" class="weather-item">
            <div class="weather-emoji">🌤️</div>
            <div class="weather-label">MARINE</div>
        </a>
        <a href="https://www.meteoblue.com" class="weather-item">
            <div class="weather-emoji">☁️</div>
            <div class="weather-label">BLUE</div>
        </a>
    </div>

</div>

</body>
</html>
