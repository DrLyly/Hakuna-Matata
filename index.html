<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hakuna Matata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --glass: rgba(255, 255, 255, 0.04); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --icon-bg: rgba(255, 255, 255, 0.06);
        }

        body {
            background: #222 url("https://i.postimg.cc/50QfZ2Kw/fond.jpg") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.15); z-index: 1; }
        
        .container { 
            position: relative; 
            z-index: 2; 
            width: 92%; 
            max-width: 420px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 85vh; /* Pour gérer l'espace vertical */
            justify-content: space-between;
        }

        h1 { font-size: 3rem; font-style: italic; font-weight: 900; text-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        .search-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 14px 22px;
            display: flex;
            margin: 25px 0 35px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .search-bar input { width: 100%; border: none; outline: none; background: transparent; font-size: 1rem; color: #000; font-weight: 500; }

        .shortcuts { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin-bottom: auto;
        }

        /* Cartes Classiques */
        .shortcut-card, .double-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 22px;
            min-height: 105px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .shortcut-card:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        .icon {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--icon-bg);
            margin-bottom: 8px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            padding: 8px;
        }
        .icon img { width: 100%; height: 100%; object-fit: contain; }

        span { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* Double boutons */
        .double-card { padding: 0; overflow: hidden; }
        .double-link {
            flex: 1; width: 100%;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; text-decoration: none; color: white;
            font-size: 0.65rem; font-weight: 800;
        }
        .double-link:first-child { border-bottom: 1px solid var(--glass-border); }
        .double-img { width: 18px; height: 18px; object-fit: contain; }

        /* MÉTÉO STYLE WIDGET (Bas de page) */
        .weather-widget {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: transparent; /* Totalement transparent */
            margin-top: 20px;
        }
        .weather-item {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
            transition: 0.3s;
        }
        .weather-item:active { opacity: 1; transform: translateY(-2px); }
        .weather-emoji { font-size: 24px; }
        .weather-label { font-size: 0.6rem; font-weight: 900; letter-spacing: 1.5px; }

        @media (max-height: 650px) {
            h1 { font-size: 2.2rem; }
            .shortcut-card, .double-card { min-height: 90px; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div>
        <h1>Hakuna Matata</h1>

        <form class="search-bar" action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Rechercher sur Google..." autocomplete="off">
        </form>

        <div class="shortcuts">
            <div class="double-card">
                <a href="https://www.20minutes.fr" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=20minutes.fr" class="double-img">
                    <span>20MIN</span>
                </a>
                <a href="https://www.huffingtonpost.fr" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=huffingtonpost.fr" class="double-img">
                    <span>HUFF</span>
                </a>
            </div>

            <div class="double-card">
                <a href="https://www.facebook.com" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=facebook.com" class="double-img">
                    <span>FB</span>
                </a>
                <a href="https://9gag.com" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=9gag.com" class="double-img">
                    <span>9GAG</span>
                </a>
            </div>

            <div class="double-card">
                <a href="https://www.ovhcloud.com/fr/mail/" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=ovh.com" class="double-img">
                    <span>MAIL</span>
                </a>
                <a href="https://www.doctolib.fr" class="double-link">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=doctolib.fr" class="double-img">
                    <span>DOC</span>
                </a>
            </div>

            <a href="https://m.youtube.com" class="shortcut-card">
                <div class="icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com"></div>
                <span>YouTube</span>
            </a>

            <a href="https://sfar.org" class="shortcut-card">
                <div class="icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=sfar.org"></div>
                <span>ANREA</span>
            </a>

            <a href="https://www.amazon.fr" class="shortcut-card">
                <div class="icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=amazon.fr"></div>
                <span>Amazon</span>
            </a>
        </div>
    </div>

    <div class="weather-widget">
        <a href="https://marine.meteoconsult.fr" class="weather-item">
            <div class="weather-emoji">🌤️</div>
            <div class="weather-label">MARINE</div>
        </a>
        <a href="https://www.meteoblue.com" class="weather-item">
            <div class="weather-emoji">☁️</div>
            <div class="weather-label">BLUE</div>
        </a>
    </div>
</div>

</body>
</html>
