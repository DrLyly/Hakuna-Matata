<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hakuna Matata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #222 url("https://i.postimg.cc/50QfZ2Kw/fond.jpg") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); z-index: 1; }
        
        .container { 
            position: relative; 
            z-index: 2; 
            width: 90%; 
            max-width: 360px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between; /* Espace optimisé entre haut et bas */
            padding: 60px 0 20px 0; /* Marges haut/bas */
        }

        h1 { 
            font-size: 2.5rem; 
            font-style: italic; 
            font-weight: 900; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            margin-bottom: 5px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            margin: 0 auto 40px auto;
            width: 85%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .search-bar input { width: 100%; border: none; outline: none; background: transparent; font-size: 0.9rem; color: #000; text-align: center; }

        /* GRILLE D'ICÔNES FLOTTANTES ÉPURÉES */
        .shortcuts { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px 10px; /* Plus d'espace vertical entre les icônes */
            margin-bottom: auto; /* Pousse la météo vers le bas */
        }

        .icon-item {
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            /* Transparence globale de l'icône */
            opacity: 0.7; 
        }

        .icon-item:active { transform: scale(0.85); opacity: 1; }

        .icon-circle {
            width: 45px; /* Plus petit */
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.4));
        }

        .icon-circle img {
            width: 32px; /* Plus petit */
            height: 32px;
            object-fit: contain;
        }

        /* MÉTÉO TOUT EN BAS */
        .weather-widget {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding-bottom: 5px; /* Très proche du bord */
        }
        .weather-item {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.6; /* Plus discret */
            transition: 0.3s;
        }
        .weather-emoji { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .weather-label { font-size: 0.5rem; font-weight: 900; letter-spacing: 1.5px; margin-top: 4px; }

        @media (max-height: 650px) {
            h1 { font-size: 2rem; }
            .shortcuts { gap: 25px 10px; }
            .icon-circle { width: 40px; height: 40px; }
            .icon-circle img { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    
    <div class="main-content">
        <h1>Hakuna Matata</h1>

        <form class="search-bar" action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Rechercher..." autocomplete="off">
        </form>

        <div class="shortcuts">
            <a href="https://www.20minutes.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=20minutes.fr"></div>
            </a>
            <a href="https://www.facebook.com" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=facebook.com"></div>
            </a>
            <a href="https://www.ovhcloud.com/fr/mail/" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=ovh.com"></div>
            </a>

            <a href="https://www.huffingtonpost.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=huffingtonpost.fr"></div>
            </a>
            <a href="https://9gag.com" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=9gag.com"></div>
            </a>
            <a href="https://www.doctolib.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=doctolib.fr"></div>
            </a>

            <a href="https://m.youtube.com" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com"></div>
            </a>
            <a href="https://sfar.org" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=sfar.org"></div>
            </a>
            <a href="https://www.amazon.fr" class="icon-item">
                <div class="icon-circle"><img src="https://www.google.com/s2/favicons?sz=128&domain=amazon.fr"></div>
            </a>
        </div>
    </div>

    <div class="weather-widget">
        <a href="https://marine.meteoconsult.fr" class="weather-item">
            <div class="weather-emoji">🌤️</div>
            <div class="weather-label">MARINE</div>
        </a>
        <a href="https://www.meteoblue.com" class="weather-item">
            <div class="weather-emoji">☁️</div>
            <div class="weather-label">BLUE</div>
        </a>
    </div>

</div>

</body>
</html>
