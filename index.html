<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hakuna Matata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #222 url("https://i.postimg.cc/50QfZ2Kw/fond.jpg") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); z-index: 1; }
        
        .container { 
            position: relative; 
            z-index: 2; 
            width: 92%; 
            max-width: 380px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Descend légèrement l'ensemble du contenu */
            padding-top: 40px; 
        }

        h1 { 
            font-size: 2.8rem; 
            font-style: italic; 
            font-weight: 900; 
            text-shadow: 0 5px 25px rgba(0,0,0,0.6); 
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            width: 100%;
            margin-bottom: 45px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .search-bar input { width: 100%; border: none; outline: none; background: transparent; font-size: 1rem; color: #000; }

        .shortcuts { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
            width: 100%;
        }

        .shortcut-card, .double-card {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            opacity: 0.9;
        }

        .shortcut-card:active, .double-link:active { transform: scale(0.9); }

        /* Taille des logos réduite */
        .icon {
            width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }
        .icon img, .double-img { width: 100%; height: 100%; object-fit: contain; }

        .double-card { gap: 20px; }
        .double-link { 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.4));
        }

        /* MÉTÉO - Abaissée par rapport aux favoris */
        .weather-widget {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 70px; /* Espace important pour l'effet "Dock" en bas */
            width: 100%;
        }
        .weather-item {
            text-decoration: none;
            opacity: 0.8;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transition: 0.3s;
        }
        .weather-emoji { font-size: 28px; }

        @media (max-height: 700px) {
            h1 { font-size: 2.4rem; }
            .shortcuts { gap: 20px; }
            .container { padding-top: 20px; }
            .weather-widget { margin-top: 50px; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1>Hakuna Matata</h1>

    <form class="search-bar" action="https://www.google.com/search" method="GET">
        <input type="text" name="q" placeholder="Rechercher..." autocomplete="off">
    </form>

    <div class="shortcuts">
        <div class="double-card">
            <a href="https://www.20minutes.fr" class="double-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=20minutes.fr" class="double-img">
            </a>
            <a href="https://www.huffingtonpost.fr" class="double-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=huffingtonpost.fr" class="double-img">
            </a>
        </div>

        <div class="double-card">
            <a href="https://www.facebook.com" class="double-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=facebook.com" class="double-img">
            </a>
            <a href="https://9gag.com" class="double-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=9gag.com" class="double-img">
            </a>
        </div>

        <div class="double-card">
            <a href="https://www.ovhcloud.com/fr/mail/" class="double-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=ovh.com" class="double-img">
            </a>
            <a href="https://www.doctolib.fr" class="double-link">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=doctolib.fr" class="double-img">
            </a>
        </div>

        <a href="https://m.youtube.com" class="shortcut-card">
            <div class="icon"><img src="https://www.google.com/s2/favicons?sz=128&domain=youtube.com"></div>
        </a>

        <a href="https://sfar.org" class="shortcut-card">
            <div class="icon"><img src="https://www.google.com/s2/favicons?sz=128&domain=sfar.org"></div>
        </a>

        <a href="https://www.amazon.fr" class="shortcut-card">
            <div class="icon"><img src="https://www.google.com/s2/favicons?sz=128&domain=amazon.fr"></div>
        </a>
    </div>

    <div class="weather-widget">
        <a href="https://marine.meteoconsult.fr" class="weather-item">
            <div class="weather-emoji">🌤️</div>
        </a>
        <a href="https://www.meteoblue.com" class="weather-item">
            <div class="weather-emoji">☁️</div>
        </a>
    </div>
</div>

</body>
</html>
